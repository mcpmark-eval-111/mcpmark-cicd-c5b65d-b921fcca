# Pull Request Automation Workflow for Node.js project
# Updated by eram711

name: Pull Request Automation Workflow

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  code-quality:
    name: code-quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run ESLint Checks
        run: |
          npm run lint > eslint-output.txt 2>&1 || (echo "failed" > eslint-status.txt && false)
        continue-on-error: true

      - name: Run Prettier Checks
        run: |
          npx prettier --check . > prettier-output.txt 2>&1 || (echo "failed" > prettier-status.txt && false)
        continue-on-error: true

      - name: Post Code Quality Report Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let eslintStatus = '✅ Passed';
            let eslintOutput = '';
            let prettierStatus = '✅ Passed';
            let prettierOutput = '';
            
            try {
              if (fs.existsSync('eslint-output.txt')) {
                eslintOutput = fs.readFileSync('eslint-output.txt', 'utf8').trim();
              }
              if (fs.existsSync('eslint-status.txt')) eslintStatus = '❌ Failed';
            } catch (err) {
              eslintOutput = 'Could not read ESLint output.';
            }
            
            try {
              if (fs.existsSync('prettier-output.txt')) {
                prettierOutput = fs.readFileSync('prettier-output.txt', 'utf8').trim();
              }
              if (fs.existsSync('prettier-status.txt')) prettierStatus = '❌ Failed';
            } catch (err) {
              prettierOutput = 'Could not read Prettier output.';
            }
            
            // Limit output size to prevent exceeding API limits
            const limitOutput = (text) => text.length > 3000 ? text.slice(0, 3000) + '
...[Truncated]...' : text;
            
            const commentBody = `### 📋 Code Quality Report
            
            #### ESLint: **${eslintStatus}**
            <details>
            <summary>ESLint Logs</summary>
            
            \`\`\`text
            ${limitOutput(eslintOutput) || 'No output.'}
            \`\`\`
            </details>
            
            #### Prettier: **${prettierStatus}**
            <details>
            <summary>Prettier Logs</summary>
            
            \`\`\`text
            ${limitOutput(prettierOutput) || 'No output.'}
            \`\`\`
            </details>
            
            *Report generated by CI pipeline.*`;
            
            const prNumber = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber
            });
            const botComment = comments.find(c => c.body.includes("Code Quality Report") && c.body.includes("ESLint") && c.body.includes("Prettier"));
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: commentBody
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: commentBody
              });
            }

      - name: Verify Quality Status
        run: |
          if [ -f eslint-status.txt ] || [ -f prettier-status.txt ]; then
            echo "Code quality checks failed."
            exit 1
          fi

  testing-suite:
    name: testing-suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Test Suite and Coverage
        run: |
          npm run test:coverage > test-output.txt 2>&1 || (echo "failed" > test-status.txt && false)
        continue-on-error: true

      - name: Post Test Coverage Report Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let testStatus = '✅ Passed';
            let testOutput = '';
            
            try {
              if (fs.existsSync('test-output.txt')) {
                testOutput = fs.readFileSync('test-output.txt', 'utf8').trim();
              }
              if (fs.existsSync('test-status.txt')) testStatus = '❌ Failed';
            } catch (err) {
              testOutput = 'Could not read test output.';
            }
            
            const limitOutput = (text) => text.length > 3000 ? text.slice(0, 3000) + '
...[Truncated]...' : text;
            
            const commentBody = `### 🧪 Test Coverage Report
            
            Status: **${testStatus}**
            
            <details>
            <summary>Test Execution and Coverage Logs</summary>
            
            \`\`\`text
            ${limitOutput(testOutput) || 'No output.'}
            \`\`\`
            </details>
            
            *Report generated by CI pipeline.*`;
            
            const prNumber = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber
            });
            const botComment = comments.find(c => c.body.includes("Test Coverage Report"));
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: commentBody
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: commentBody
              });
            }

      - name: Upload Coverage Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: ignore

      - name: Verify Test Status
        run: |
          if [ -f test-status.txt ]; then
            echo "tests failed"
            exit 1
          fi

  security-scan:
    name: security-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Dependency Audit
        run: |
          npm audit > audit-output.txt 2>&1 || (echo "failed" > audit-status.txt && false)
        continue-on-error: true

      - name: Scan for Secrets
        run: |
          echo "Scanning for secrets..." > secret-output.txt
          if grep -rnEi 'api_key|client_secret|private_key|db_password' src/ tests/ 2>/dev/null; then
            echo "POTENTIAL SECRETS DETECTED!" >> secret-output.txt
            grep -rnEi 'api_key|client_secret|private_key|db_password' src/ tests/ 2>/dev/null >> secret-output.txt
            echo "failed" > secret-status.txt
          else
            echo "No secrets or sensitive keys found in source code." >> secret-output.txt
          fi

      - name: Post Security Scan Report Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let auditStatus = '✅ Passed';
            let auditOutput = '';
            let secretStatus = '✅ Passed';
            let secretOutput = '';
            
            try {
              if (fs.existsSync('audit-output.txt')) {
                auditOutput = fs.readFileSync('audit-output.txt', 'utf8').trim();
              }
              if (fs.existsSync('audit-status.txt')) auditStatus = '⚠️ Vulnerabilities Found';
            } catch (err) {
              auditOutput = 'Could not read audit output.';
            }
            
            try {
              if (fs.existsSync('secret-output.txt')) {
                secretOutput = fs.readFileSync('secret-output.txt', 'utf8').trim();
              }
              if (fs.existsSync('secret-status.txt')) secretStatus = '❌ Secrets Found';
            } catch (err) {
              secretOutput = 'Could not read secret scan output.';
            }
            
            const limitOutput = (text) => text.length > 3000 ? text.slice(0, 3000) + '
...[Truncated]...' : text;
            
            const commentBody = `### 🛡️ Security Scan Report
            
            #### Dependencies Audit: **${auditStatus}**
            <details>
            <summary>Dependency Audit Logs</summary>
            
            \`\`\`text
            ${limitOutput(auditOutput) || 'No output.'}
            \`\`\`
            </details>
            
            #### Secrets Scan: **${secretStatus}**
            <details>
            <summary>Secrets Scan Logs</summary>
            
            \`\`\`text
            ${limitOutput(secretOutput) || 'No output.'}
            \`\`\`
            </details>
            
            *Report generated by CI pipeline.*`;
            
            const prNumber = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber
            });
            const botComment = comments.find(c => c.body.includes("Security Scan Report") && c.body.includes("Vulnerabilities") && c.body.includes("Dependencies"));
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: commentBody
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: commentBody
              });
            }

      - name: Verify Security Status
        run: |
          if [ -f secret-status.txt ]; then
            echo "Secrets check failed."
            exit 1
          fi

  build-validation:
    name: build-validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Attempt Build
        run: |
          npm run build > build-output.txt 2>&1 || (echo "failed" > build-status.txt && false)
        continue-on-error: true

      - name: Run Endpoints Validation
        run: |
          npm start &
          SERVER_PID=$!
          sleep 3
          
          echo "Validating endpoints..." > endpoint-validation.txt
          
          echo "Checking GET /..." >> endpoint-validation.txt
          curl -s -f http://localhost:3000/ || (echo "GET / failed" && echo "failed" > validation-status.txt)
          
          echo "Checking GET /health..." >> endpoint-validation.txt
          curl -s -f http://localhost:3000/health || (echo "GET /health failed" && echo "failed" > validation-status.txt)
          
          echo "Checking POST /calculate..." >> endpoint-validation.txt
          curl -s -f -X POST -H "Content-Type: application/json" -d '{"operation":"add","a":2,"b":3}' http://localhost:3000/calculate || (echo "POST /calculate failed" && echo "failed" > validation-status.txt)
          
          echo "Checking GET /users..." >> endpoint-validation.txt
          curl -s -f http://localhost:3000/users || (echo "GET /users failed" && echo "failed" > validation-status.txt)
          
          echo "Checking POST /users..." >> endpoint-validation.txt
          curl -s -f -X POST -H "Content-Type: application/json" -d '{"name":"John Doe","email":"john@example.com"}' http://localhost:3000/users || (echo "POST /users failed" && echo "failed" > validation-status.txt)
          
          echo "Checking GET /status/deployment..." >> endpoint-validation.txt
          curl -s -f http://localhost:3000/status/deployment || (echo "GET /status/deployment failed" && echo "failed" > validation-status.txt)
          
          kill $SERVER_PID || true
        continue-on-error: true

      - name: Create Deployment Preview Artifacts
        run: |
          mkdir -p deployment-preview
          echo '{
            "status": "success",
            "sha": "'"$GITHUB_SHA"'",
            "ref": "'"$GITHUB_REF"'",
            "timestamp": "'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"
          }' > deployment-preview/metadata.json

      - name: Upload Deployment Preview
        uses: actions/upload-artifact@v4
        with:
          name: deployment-preview
          path: deployment-preview/

      - name: Post Build Validation Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let buildStatus = '✅ Passed';
            let buildOutput = '';
            let validationStatus = '✅ Passed';
            let validationOutput = '';
            
            try {
              if (fs.existsSync('build-output.txt')) {
                buildOutput = fs.readFileSync('build-output.txt', 'utf8').trim();
              }
              if (fs.existsSync('build-status.txt')) buildStatus = '❌ Failed';
            } catch (err) {
              buildOutput = 'Could not read build output.';
            }
            
            try {
              if (fs.existsSync('endpoint-validation.txt')) {
                validationOutput = fs.readFileSync('endpoint-validation.txt', 'utf8').trim();
              }
              if (fs.existsSync('validation-status.txt')) validationStatus = '❌ Failed';
            } catch (err) {
              validationOutput = 'Could not read validation output.';
            }
            
            const limitOutput = (text) => text.length > 3000 ? text.slice(0, 3000) + '
...[Truncated]...' : text;
            
            const commentBody = `### 🚀 Build Validation Report
            
            #### Build Status: **${buildStatus}**
            <details>
            <summary>Build Logs</summary>
            
            \`\`\`text
            ${limitOutput(buildOutput) || 'No output.'}
            \`\`\`
            </details>
            
            #### Endpoints Validation: **${validationStatus}**
            <details>
            <summary>Endpoint Validation Logs</summary>
            
            \`\`\`text
            ${limitOutput(validationOutput) || 'No output.'}
            \`\`\`
            </details>
            
            *Report generated by CI pipeline.*`;
            
            const prNumber = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber
            });
            const botComment = comments.find(c => c.body.includes("Build Validation Report") || c.body.includes("Build Validation"));
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: commentBody
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: commentBody
              });
            }

      - name: Verify Build Validation Status
        run: |
          if [ -f build-status.txt ] || [ -f validation-status.txt ]; then
            echo "Build validation check failed."
            exit 1
          fi
