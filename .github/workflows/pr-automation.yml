name: Pull Request Automation Workflow

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  code-quality:
    name: code-quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint Checks
        id: run_eslint
        continue-on-error: true
        run: npm run lint

      - name: Run Prettier Formatting Checks
        id: run_prettier
        continue-on-error: true
        run: npx prettier --check "src/**/*.js"

      - name: Post Code Quality Report Comment
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            (async () => {
              const eslintPassed = '${{ steps.run_eslint.outcome }}' === 'success';
              const prettierPassed = '${{ steps.run_prettier.outcome }}' === 'success';
              const eslintStatus = eslintPassed ? 'Passed ✅' : 'Failed ❌';
              const prettierStatus = prettierPassed ? 'Passed ✅' : 'Failed ❌';
              const overallStatus = (eslintPassed && prettierPassed) ? 'Passed ✅' : 'Failed ❌';
              
              const commentBody = `### Code Quality Report

` +
                `Hello! Here are the results of the code quality checks for this Pull Request:

` +
                `- **ESLint**: ${eslintStatus}
` +
                `- **Prettier**: ${prettierStatus}

` +
                `Overall Status: **${overallStatus}**`;
                
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: commentBody
              });
            })();

      - name: Enforce Status
        run: |
          if [ "${{ steps.run_eslint.outcome }}" != "success" ] || [ "${{ steps.run_prettier.outcome }}" != "success" ]; then
            echo "Code Quality checks failed."
            exit 1
          fi

  testing-suite:
    name: testing-suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Test Suite with Coverage
        id: run_tests
        continue-on-error: true
        run: npm run test:coverage

      - name: Post Test Coverage Report Comment
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            (async () => {
              const testsPassed = '${{ steps.run_tests.outcome }}' === 'success';
              const testStatus = testsPassed ? 'Passed ✅' : 'Failed ❌';
              
              const commentBody = `### Test Coverage Report

` +
                `Hello! Here are the results of the test suite execution and coverage checks:

` +
                `- **Test Suite Status**: ${testStatus}
` +
                `- **Coverage Report**: Artifacts have been uploaded to this workflow run.

` +
                `_Check the job logs and download the artifacts for detailed coverage files._`;
                
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: commentBody
              });
            })();

      - name: Upload Coverage Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/

      - name: Enforce Status
        run: |
          if [ "${{ steps.run_tests.outcome }}" != "success" ]; then
            echo "Test suite failed."
            exit 1
          fi

  security-scan:
    name: security-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Dependency Audit
        id: dependency_audit
        continue-on-error: true
        run: npm audit --audit-level=high

      - name: Scan for Secrets in Diff
        id: secrets_check
        continue-on-error: true
        run: |
          echo "Scanning code changes for secrets..."
          git fetch origin ${{ github.base_ref }} --depth=1
          git diff origin/${{ github.base_ref }}...HEAD > pr_changes.diff
          
          # Use obfuscated matching terms to avoid matching our own workflow file
          if grep -Ei "api_k[e]y|api_t[o]ken|private_k[e]y|client_s[e]cret|db_p[a]ssword" pr_changes.diff | grep -Ev "package\.json|package-lock\.json"; then
            echo "has_secrets=true" >> $GITHUB_OUTPUT
            echo "Warning: Potential secrets detected in the pull request diff!"
          else
            echo "has_secrets=false" >> $GITHUB_OUTPUT
            echo "No potential secrets found."
          fi

      - name: Post Security Scan Report Comment
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            (async () => {
              const auditPassed = '${{ steps.dependency_audit.outcome }}' === 'success';
              const secretsFound = '${{ steps.secrets_check.outputs.has_secrets }}' === 'true';
              
              const dependencyStatus = auditPassed ? 'Passed ✅' : 'Warning ⚠️ (Some vulnerabilities or audit issue detected)';
              const secretScanStatus = !secretsFound ? 'Passed ✅ (No potential secrets detected)' : 'Failed ❌ (Potential secrets/credentials detected)';
              
              const commentBody = `### Security Scan Report

` +
                `Here are the security validation results for this Pull Request:

` +
                `- **Dependencies**: ${dependencyStatus}
` +
                `- **Vulnerabilities**: Assessed via \`npm audit\`.
` +
                `- **Secrets Scan**: ${secretScanStatus}

` +
                `_Please review any warnings or failures in the security-scan job log._`;
                
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: commentBody
              });
            })();

      - name: Enforce Status
        run: |
          if [ "${{ steps.secrets_check.outputs.has_secrets }}" = "true" ]; then
            echo "Secrets check failed. Please remove any exposed secrets."
            exit 1
          fi

  build-validation:
    name: build-validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Attempt Build
        id: app_build
        continue-on-error: true
        run: npm run build

      - name: Start App and Validate Endpoints
        id: endpoint_validation
        continue-on-error: true
        run: |
          echo "Starting Node.js application..."
          npm start &
          APP_PID=$!
          
          echo "Waiting 3 seconds for server to boot..."
          sleep 3
          
          echo "Validating accessibility of endpoints..."
          curl -f http://localhost:3000/
          curl -f http://localhost:3000/health
          curl -f -X POST -H "Content-Type: application/json" -d '{"operation":"add","a":10,"b":20}' http://localhost:3000/calculate
          curl -f http://localhost:3000/users
          curl -f -X POST -H "Content-Type: application/json" -d '{"name":"QA Tester","email":"qa@example.com"}' http://localhost:3000/users
          curl -f http://localhost:3000/status/deployment
          
          echo "Stopping application background process..."
          kill $APP_PID

      - name: Create Deployment Preview Artifacts
        run: |
          mkdir -p deployment-preview
          cat <<EOF > deployment-preview/index.html
          <!DOCTYPE html>
          <html>
          <head>
            <title>Deployment Preview Status</title>
          </head>
          <body>
            <h1>Deployment Preview Validation</h1>
            <p><strong>Status:</strong> Successful</p>
            <p><strong>Commit SHA:</strong> ${GITHUB_SHA}</p>
            <p><strong>Build Number:</strong> ${GITHUB_RUN_NUMBER}</p>
            <p><strong>Timestamp:</strong> $(date -u)</p>
          </body>
          </html>
          EOF
          
          cat <<EOF > deployment-preview/status.json
          {
            "status": "success",
            "commit": "${GITHUB_SHA}",
            "build": ${GITHUB_RUN_NUMBER},
            "timestamp": "$(date -u)"
          }
          EOF

      - name: Post Build Status Comment
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            (async () => {
              const buildPassed = '${{ steps.app_build.outcome }}' === 'success';
              const endpointsPassed = '${{ steps.endpoint_validation.outcome }}' === 'success';
              
              const buildStatus = buildPassed ? 'Passed ✅' : 'Failed ❌';
              const endpointStatus = endpointsPassed ? 'Passed ✅' : 'Failed ❌';
              
              const commentBody = `### Build Validation Report

` +
                `Pull Request build and deployment validation results:

` +
                `- **Application Build**: ${buildStatus}
` +
                `- **Endpoints Accessibility**: ${endpointStatus}
` +
                `- Deployment preview artifacts successfully generated.

` +
                `_You can find the preview files in the artifacts uploaded to this run._`;
                
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: commentBody
              });
            })();

      - name: Upload Deployment Preview Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: deployment-preview-artifacts
          path: deployment-preview/

      - name: Enforce Status
        run: |
          if [ "${{ steps.app_build.outcome }}" != "success" ] || [ "${{ steps.endpoint_validation.outcome }}" != "success" ]; then
            echo "Build validation or endpoint verification failed."
            exit 1
          fi
